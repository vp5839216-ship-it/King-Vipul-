<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Store | 3D Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Mega<span>Store</span></div>
        <div class="search-container">
            <input type="text" placeholder="Search for products, brands and more">
            <button><i class="fas fa-search"></i></button>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#"><i class="fas fa-user"></i> Sahil</a></li>
                <li><a href="#"><i class="fas fa-shopping-cart"></i> Cart</a></li>
                <li><a href="#"><i class="fas fa-store"></i> Become a Seller</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Upgrade Your Style 3D</h1>
            <p>India's Biggest Sale is LIVE Now!</p>
            <button class="shop-now">Explore Now</button>
        </div>
    </section>

    <main class="main-container">
        <h2 class="section-title">Trending Now</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <div class="card-inner">
                    <div class="image-box">
                        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=80&w=400" alt="Shoes">
                    </div>
                    <div class="content-box">
                        <h3>Nike Air Max 270</h3>
                        <p class="price">₹12,495 <span class="discount">20% OFF</span></p>
                        <div class="stars">★★★★☆</div>
                        <button class="buy-btn">Add to Cart</button>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="card-inner">
                    <div class="image-box">
                        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=400" alt="Headphones">
                    </div>
                    <div class="content-box">
                        <h3>Sony WH-1000XM4</h3>
                        <p class="price">₹24,990 <span class="discount">15% OFF</span></p>
                        <div class="stars">★★★★★</div>
                        <button class="buy-btn">Add to Cart</button>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="card-inner">
                    <div class="image-box">
                        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=400" alt="Watch">
                    </div>
                    <div class="content-box">
                        <h3>Premium Smart Watch</h3>
                        <p class="price">₹4,999 <span class="discount">50% OFF</span></p>
                        <div class="stars">★★★★☆</div>
                        <button class="buy-btn">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MegaStore India | All Rights Reserved</p>
    </footer>

</body>
</html>
